server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all /api traffic to the Node.js backend.
    #
    # proxy_buffering off is required for SSE (the /api/sales/:slug/events
    # stream) — nginx would otherwise buffer the chunked response and stall
    # the client's EventSource. proxy_read_timeout is extended to outlast
    # long-lived streams without nginx cutting them mid-session.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: unknown paths serve index.html so React Router handles
    # client-side navigation without 404s from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
