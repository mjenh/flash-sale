services:
  api:
    build: .
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongo:27017/flash-sale
      # Overridable sale config; defaults give an already-active sale for inspection.
      SALE_START_TIME: ${SALE_START_TIME:-2026-01-01T00:00:00Z}
      SALE_END_TIME: ${SALE_END_TIME:-2027-01-01T00:00:00Z}
      STOCK_QUANTITY: ${STOCK_QUANTITY:-100}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:8
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  mongo-data:
