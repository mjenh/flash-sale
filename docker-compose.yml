services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    # The app fail-fasts (exits non-zero) on any boot hiccup — a Redis blip after
    # healthchecks pass, a slow Mongo election — so without a restarter compose
    # would leave the one-command stack permanently dead. `init: true` reaps
    # zombies and forwards SIGTERM to PID 1 so the SIGTERM/SIGINT teardown
    # handler actually runs on `docker compose stop`/`down`.
    restart: unless-stopped
    init: true
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongo:27017/flash-sale
      # Sale timing, stock, and product config live in MongoDB.
      # Run `node db/scripts/seed-db.ts` before the first `make deploy`.
      # false (default) → write-behind worker runs in the separate `worker` service.
      # true            → worker runs inside this process; omit the worker profile.
      WORKER_COLOCATED: ${WORKER_COLOCATED:-false}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    # The stress harness needs a truth signal for "the API is back up" after the
    # reset restart; `docker compose start api` returns before the boot sequence
    # reconcile has finished.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Write-behind worker — separate process, independent scaling.
  # Activated by the "worker" profile (see Makefile deploy / make deploy).
  # Omit this service (no profile) when WORKER_COLOCATED=true; the api service
  # already runs the worker in that mode — starting both would double-consume.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.server
    command: ["node", "src/worker/index.ts"]
    restart: unless-stopped
    init: true
    environment:
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongo:27017/flash-sale
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    profiles: ["worker"]

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    # Published for the documented dev loop (`npm run dev` against
    # redis://localhost:6379) and for the stress harness's reset/verify steps,
    # which run on the host and speak to the stores directly. Bound to loopback
    # ONLY: a "6379:6379" publish reaches 0.0.0.0 and, on Linux,
    # punches through the host firewall — an unauthenticated Redis on a routable
    # interface is a textbook RCE vector. The harness only ever needs localhost.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:8
    # Loopback only — unauthenticated Mongo must not be routable.
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  mongo-data:
